summary: Integration tests for gnu-coreutils

prepare: |
  # Deb arch to GOARCH.
  arch="$(dpkg --print-architecture | sed -e 's/armhf/arm/g' -e 's/ppc64el/ppc64le/g')"
  # Install yq.
  wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${arch} \
    -O /usr/bin/yq
  chmod +x /usr/bin/yq
  yq --version

execute: |
  # Run smoke tests.
  ./smoke.sh

  # Run single-binary slices tests
  # Forward port from 24.04

  # test env
  rootfs_env="$(install-slices gnu-coreutils_env)"
  chroot "$rootfs_env" gnuenv --version

  # test expr binary
  rootfs_expr="$(install-slices gnu-coreutils_expr)"
  chroot "$rootfs_expr" gnuexpr --version

  # test mkdir binary
  rootfs_mkdir="$(install-slices gnu-coreutils_mkdir)"
  chroot "$rootfs_mkdir" gnumkdir test_dir
  test -d "$rootfs_mkdir/test_dir"

  # test echo binary
  rootfs_echo="$(install-slices gnu-coreutils_echo)"
  chroot "$rootfs_echo" gnuecho "Hello, World!"

  # test ln binary
  rootfs_ln="$(install-slices gnu-coreutils_ln-utility)"
  touch "$rootfs_ln/test_file"
  chroot "$rootfs_ln" gnuln -s test_file test_link
  test -L "$rootfs_ln/test_link"

  # test rm binary
  rootfs_rm="$(install-slices gnu-coreutils_rm-utility)"
  touch "$rootfs_rm/test_file"
  chroot "$rootfs_rm" gnurm test_file
  test ! -e "$rootfs_rm/test_file"

  # test readlink binary
  rootfs_readlink="$(install-slices gnu-coreutils_readlink)"
  touch "$rootfs_readlink/test_file"
  ln -s test_file "$rootfs_readlink/test_link"
  chroot "$rootfs_readlink" gnureadlink test_link | grep "test_file"

  # test sort binary
  rootfs_sort="$(install-slices gnu-coreutils_sort)"
  echo -e "banana\napple\ncherry" > "$rootfs_sort/test_file"
  chroot "$rootfs_sort" gnusort test_file > sorted_output
  # NOTE: sorted output has a trailing newline. replaced by hyphen to show better
  test "$(cat sorted_output | tr '\n' '-')" = "apple-banana-cherry-"

  # test dirname binary
  rootfs_dirname="$(install-slices gnu-coreutils_dirname)"
  mkdir -p "$rootfs_dirname/foo/bar"
  touch "$rootfs_dirname/foo/bar/baz.txt"
  test "$(chroot "$rootfs_dirname" gnudirname /foo/bar/baz.txt)" = "/foo/bar"
  test "$(chroot "$rootfs_dirname" gnudirname /foo/bar/)" = "/foo"

  # test touch binary
  rootfs_touch="$(install-slices gnu-coreutils_touch)"
  chroot "$rootfs_touch" gnutouch test_file
  test -e "$rootfs_touch/test_file"

  # test printf binary
  rootfs_printf="$(install-slices gnu-coreutils_printf)"
  test "$(chroot "$rootfs_printf" gnuprintf "hello\n" )" = "hello"
  test "$(chroot "$rootfs_printf" gnuprintf "hello-%s\n" "world")" = "hello-world"
  test "$(chroot "$rootfs_printf" gnuprintf "number: %d\n" 42)" = "number: 42"
  test "$(chroot "$rootfs_printf" gnuprintf "float: %.2f\n" 3.14159)" = "float: 3.14"

  # test cat binary
  rootfs_cat="$(install-slices gnu-coreutils_cat)"
  echo "Hello, World!" > "$rootfs_cat/test_file"
  test "$(chroot "$rootfs_cat" gnucat test_file)" = "Hello, World!"

  # test ls binary
  rootfs_ls="$(install-slices gnu-coreutils_ls-utility)"
  mkdir -p "$rootfs_ls/test_dir"
  touch "$rootfs_ls/test_dir/file1"
  touch "$rootfs_ls/test_dir/file2"
  test "$(chroot "$rootfs_ls" gnuls test_dir | sort)" = "$(printf "file1\nfile2")"
  test "$(chroot "$rootfs_ls" gnuls -a test_dir | sort)" = "$(printf ".\n..\nfile1\nfile2")"

  # test wc binary
  rootfs_wc="$(install-slices gnu-coreutils_wc-utility)"
  chroot "$rootfs_wc" gnuwc --version
  echo -e "line1\nline2\nline3" > "$rootfs_wc/test_file"
  test "$(chroot "$rootfs_wc" gnuwc -l test_file | awk '{print $1}')" = "3"
  test "$(chroot "$rootfs_wc" gnuwc -w test_file | awk '{print $1}')" = "3"
  test "$(chroot "$rootfs_wc" gnuwc -c test_file | awk '{print $1}')" = "18"

  # test chgrp binary
  rootfs_chgrp="$(install-slices gnu-coreutils_chgrp)"
  chroot "$rootfs_chgrp" gnuchgrp --version
  touch "$rootfs_chgrp/test_file"
  # NOTE: we don't have group management in the test environment, so we just test
  # with a non-existent group
  chroot "$rootfs_chgrp" gnuchgrp non-existent-group test_file 2>&1 | grep "invalid group"

  # test realpath binary
  rootfs_realpath="$(install-slices gnu-coreutils_realpath)"
  chroot "$rootfs_realpath" gnurealpath --version
  mkdir -p "$rootfs_realpath/foo/bar"
  touch "$rootfs_realpath/foo/bar/baz.txt"
  test "$(chroot "$rootfs_realpath" gnurealpath /foo/bar/baz.txt)" = "/foo/bar/baz.txt"
  ln -s /foo/bar/baz.txt "$rootfs_realpath/foo/bar/baz_link.txt"
  test "$(chroot "$rootfs_realpath" gnurealpath /foo/bar/baz_link.txt)" = "/foo/bar/baz.txt"

  # test sync binary
  rootfs_sync="$(install-slices gnu-coreutils_sync)"
  chroot "$rootfs_sync" gnusync --version
  # NOTE: we can't easily test the actual syncing functionality,
  # but we can at least test that the command runs without error
  chroot "$rootfs_sync" gnusync