summary: Integration tests for python3-pip

execute: |
  rootfs="$(install-slices python3-pip_scripts)"

  cp /etc/resolv.conf "$rootfs/etc/"

  # Smoke tests for pip
  chroot "$rootfs" /usr/bin/pip --version
  chroot "$rootfs" /usr/bin/pip install --upgrade setuptools

  # Smoke tests for pip3
  chroot "$rootfs" /usr/bin/pip3 --version
  chroot "$rootfs" /usr/bin/pip3 install --upgrade setuptools
