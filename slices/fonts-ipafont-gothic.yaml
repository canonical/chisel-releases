package: fonts-ipafont-gothic
# hello world;2i

essential:
  - fonts-ipafont-gothic_copyright

slices:
  fonts:
    contents:
      /usr/share/fonts/opentype/ipafont-gothic/*.ttf:

  config:
    contents:
      /etc/fonts/conf.avail/65-fonts-ipafont-gothic.conf:

  copyright:
    contents:
      /usr/share/doc/fonts-ipafont-gothic/copyright:
