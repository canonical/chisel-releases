package: binutils-x86-64-linux-gnu

essential:
  - binutils-x86-64-linux-gnu_copyright

slices:

  linker:
    essential:
      - libc6_libs
      - libctf0_libs      # libctf.so.0
      - libjansson4_libs  # libjansson.so.4

    contents:
      # linker
      /usr/bin/x86_64-linux-gnu-ld.bfd:
      # symlink to /usr/bin/x86_64-linux-gnu-ld.bfd
      /usr/bin/x86_64-linux-gnu-ld:

  copyright:
    essential:
      - libbinutils_copyright
    contents:
      # Symlink to libbinutils
      /usr/share/doc/binutils-x86-64-linux-gnu:
        arch: [ amd64 ]
      # Copyright file for cross-compiled architectures
      /usr/share/doc/binutils-x86-64-linux-gnu/copyright:
        arch: [ ppc64el, riscv64, s390x, arm64 ]
