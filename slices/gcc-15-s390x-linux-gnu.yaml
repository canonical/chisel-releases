package: gcc-15-s390x-linux-gnu

essential:
  gcc-15-s390x-linux-gnu_copyright:

slices:
  # NOTE: You might want to create a symlink from /usr/bin/gcc to
  #       /usr/bin/s390x-linux-gnu-gcc to use this slice.
  #       ln -s s390x-linux-gnu-gcc-15 "$rootfs/usr/bin/gcc"
  # NOTE: For this slice to work, you need to also provide the linker,
  #       the assembler and cc1 c compiler. The default ones are from
  #       cpp-15-s390x-linux-gnu and binutils-s390x-linux-gnu slices.
  #       You'll also need to create symlinks for them:
  #       ln -s s390x-linux-gnu-ld "$rootfs/usr/bin/ld"
  #       ln -s s390x-linux-gnu-as "$rootfs/usr/bin/as"
  gcc-15:
    essential:
      libc6_libs:
      libgcc-15-dev_headers:
    contents:
      /usr/bin/s390x-linux-gnu-gcc-15:
      /usr/libexec/gcc-cross/s390x-linux-gnu/15/collect2:
        arch: [amd64, arm64, i386, ppc64el]
      /usr/libexec/gcc-cross/s390x-linux-gnu/15/liblto_plugin.so:
        arch: [amd64, arm64, i386, ppc64el]
      /usr/libexec/gcc/s390x-linux-gnu/15/collect2:
        arch: [s390x]
      /usr/libexec/gcc/s390x-linux-gnu/15/liblto_plugin.so:
        arch: [s390x]

  copyright:
    essential:
      gcc-15-base_copyright:
    contents:
      /usr/share/doc/gcc-15-s390x-linux-gnu:
