package: libcrypt-dev

essential:
  - libcrypt-dev_copyright

slices:
  libs:
    essential:
      - libcrypt1_libs
    contents:
      /usr/lib/*-linux-*/libcrypt.a:
      # Symlink to .so in libcrypt1
      /usr/lib/*-linux-*/libcrypt.so:

  headers:
    contents:
      /usr/include/crypt.h:

  copyright:
    essential:
      - libcrypt1_copyright
    contents:
      # Symlink to libcrypt1
      /usr/share/doc/libcrypt-dev:
