package: binutils-aarch64-linux-gnu

essential:
  - binutils-aarch64-linux-gnu_copyright

slices:
  
  linker:
    essential:
      - libc6_libs
      - libbinutils_libs  # libbfd-2.44-system.so 
      - libctf0_libs      # libctf.so.0
      - libjansson4_libs  # libjansson.so.4
      - zlib1g_libs       # libz.so.1
      - libzstd1_libs     # libzstd.so.1
      - libsframe1_libs   # libsframe.so.1

    contents:
      # linker
      /usr/bin/aarch64-linux-gnu-ld.bfd:
        arch: [ arm64 ]
      # symlink to /usr/bin/aarch64-linux-gnu-ld.bfd
      /usr/bin/aarch64-linux-gnu-ld:
        arch: [ arm64 ]

  copyright:
    essential:
      - libbinutils_copyright
    contents:
      # Symlink to libbinutils
      /usr/share/doc/binutils-aarch64-linux-gnu:
        arch: [ arm64 ]