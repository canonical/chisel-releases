package: cron

essential:
  - cron_copyright

slices:

  # Note: user must manually link /bin/sh (e.g. to /usr/bin/bash), which is what
  # cron looks for by default to run jobs, or have the cron job specify the shell
  # explicitly with a SHELL= directive.
  daemon:
    essential:
      - base-passwd_data
      - bash_bins
      - libpam-modules_libs
      - libpam-runtime_config
      - libpam0g_libs
      - libselinux1_libs
    contents:
      /usr/sbin/cron:

  crontab:
    essential:
      - cron_daemon
    contents:
      /etc/supercat/spcrc-crontab:
      /etc/supercat/spcrc-crontab-light:
      /usr/bin/crontab:

  config:
    contents:
      /etc/default/cron:
      /etc/pam.d/cron:

  copyright:
    contents:
      /usr/share/doc/cron/copyright:
