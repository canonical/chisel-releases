package: cron

essential:
  - cron_copyright

slices:
  daemon:
    essential:
      - base-passwd_data
      - base-files_bin
      - dash_bins
      - libpam-modules_libs
      - libpam-runtime_config
      - libpam0g_libs
      - libselinux1_libs
    contents:
      /usr/sbin/cron:

  crontab:
    # crontab needs /var/spool/cron/crontabs to store user crontabs, so user must create this dir
    essential:
      - cron_daemon
      - base-files_tmp
    contents:
      /etc/supercat/spcrc-crontab:
      /etc/supercat/spcrc-crontab-light:
      /usr/bin/crontab:

  config:
    contents:
      /etc/default/cron:
      /etc/pam.d/cron:

  copyright:
    contents:
      /usr/share/doc/cron/copyright:
