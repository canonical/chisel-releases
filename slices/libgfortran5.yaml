package: libgfortran5

essential:
  - libgfortran5_copyright

slices:
  libs:
    essential:
      - libc6_libs
      - libgcc-s1_libs
    contents:
      /usr/lib/*-linux-*/libgfortran.so.5*:

  copyright:
    essential:
      # NOTE: FP likely needs arch-qualified essentials.
      - gcc-14-base_copyright
    contents:
      # Symlink to gcc-14-base
      /usr/share/doc/libgfortran5:
