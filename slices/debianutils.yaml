package: debianutils

essential:
  debianutils_copyright:

slices:
  bins:
    essential:
      debianutils_ischroot:
      debianutils_run-parts:
      debianutils_which:

  which:
    essential:
      base-files_bin:
      dash_bins:
    contents:
      # Note: This symlink should have a prefer: gnu-which if both are present
      /usr/bin/which: {symlink: which.debianutils}
      /usr/bin/which.debianutils:

  ischroot:
    essential:
      libc6_libs:
    contents:
      /usr/bin/ischroot:

  run-parts:
    essential:
      libc6_libs:
    contents:
      /usr/bin/run-parts:

  copyright:
    contents:
      /usr/share/doc/debianutils/copyright:
