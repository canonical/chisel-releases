package: debianutils

essential:
  debianutils_copyright:

slices:
  bins:
    essential:
      debianutils_ischroot:
      debianutils_run-parts:
      debianutils_tempfile:

  scripts:
    essential:
      debianutils_savelog:
      debianutils_which:

  which:
    essential:
      base-files_bin:
      dash_bins:
    contents:
      # Note: This symlink should have a prefer: gnu-which if both are present
      /usr/bin/which: {symlink: which.debianutils}
      /usr/bin/which.debianutils:

  ischroot:
    essential:
      libc6_libs:
    contents:
      /usr/bin/ischroot:

  run-parts:
    essential:
      libc6_libs:
    contents:
      /usr/bin/run-parts:

  tempfile:
    essential:
      base-files_tmp:
      libc6_libs:
    contents:
      /usr/bin/tempfile:

  savelog:
    essential:
      base-files_bin:
      coreutils_basename:
      coreutils_chgrp:
      coreutils_chmod:
      coreutils_chown:
      coreutils_date:
      coreutils_dirname:
      coreutils_ln-utility:
      coreutils_ls-utility:
      coreutils_mkdir:
      coreutils_mv-utility:
      coreutils_rm-utility:
      coreutils_touch:
      dash_bins:
      sed_bins:
    contents:
      /usr/sbin/savelog:

  copyright:
    contents:
      /usr/share/doc/debianutils/copyright:
