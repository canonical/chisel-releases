package: libstd-rust-1.84

essential:
  - libstd-rust-1.84_copyright

slices:
  copyright:
    contents:
      /usr/share/doc/libstd-rust-1.84/copyright:

  rustc-driver:

    essential:
      - libc6_libs
      - libllvm19_libs         # libLLVM.so.19.1
      - libstdc++6_libs        # libstdc++.so.6
      - libgcc-s1_libs         # libgcc_s.so.1
      # - libffi8_libs         # libffi.so.8
      # - libedit2_libs        # libedit.so.2
      # - zlib1g_libs          # libz.so.1
      # - libzstd1_libs        # libzstd.so.1
      # - libxml2_libs         # libxml2.so.2
      # - libtinfo6_libs       # libtinfo.so.6
      # - libbsd0_libs         # libbsd.so.0
      # - liblzma5_libs        # liblzma.so.5
      # - libmd0_libs          # libmd.so.0

    contents:
      /usr/lib/rust-1.84/lib/librustc_driver-*.so:
      # NOTE: This is a symlink to the .so above
      /usr/lib/*-linux-*/librustc_driver-*.so:
      
