package: libc6

slices:
  config:
    contents:
      /etc/ld.so.conf.d/*-linux-*.conf:

  libs:
    contents:
      /lib/*-linux-*/ld*.so.*:
      /lib/*-linux-*/libBrokenLocale.so.*:
      /lib/*-linux-*/libanl.so.*:
      /lib/*-linux-*/libc.so.*:
      /lib/*-linux-*/libc_malloc_debug.so.*:
      /lib/*-linux-*/libdl.so.*:
      /lib/*-linux-*/libm.so.*:
      /lib/*-linux-*/libmemusage.so:
      /lib/*-linux-*/libnsl.so.*:
      /lib/*-linux-*/libnss_compat.so.*:
      /lib/*-linux-*/libnss_dns.so.*:
      /lib/*-linux-*/libnss_files.so.*:
      /lib/*-linux-*/libnss_hesiod.so.*:
      /lib/*-linux-*/libpcprofile.so:
      /lib/*-linux-*/libpthread.so.*:
      /lib/*-linux-*/libresolv.so.*:
      /lib/*-linux-*/librt.so.*:
      /lib/*-linux-*/libthread_db.so.*:
      /lib/*-linux-*/libutil.so.*:
      /lib*/ld*.so.*:

  # FIXME: libmvec is only available on amd64. Merge it with libs slice once we
  # have arch-specific path selection.
  # FIXME: Underscore as prefix is not valid name in current chisel.
  _mvec:
    essential:
      - libc6_libs
    contents:
      /lib/*-linux-*/libmvec.so.*:
