package: xfonts-utils

essential:
  xfonts-utils_copyright:

slices:
  bins:
    essential:
      libc6_libs:
      libfontenc1_libs:
      libfreetype6_libs:
      xfonts-encodings_encodings:
      xfonts-utils_maps:
      xfonts-utils_mkfontscale:
      zlib1g_libs:
    contents:
      /usr/bin/bdftopcf:
      /usr/bin/bdftruncate:
      /usr/bin/fonttosfnt:
      /usr/bin/ucs2any:

  mkfontscale:
    hint: Create index of scalable fonts for X
    essential:
      libc6_libs:
      libfontenc1_libs:
      libfreetype6_libs:
      zlib1g_libs:
    contents:
      /usr/bin/mkfontscale:

  maps:
    hint: Unicode font mappings
    contents:
      /usr/share/fonts/X11/util/*:

  scripts:
    essential:
      xfonts-utils_mkfontdir:
    contents:
      /usr/sbin/update-fonts-alias:
      /usr/sbin/update-fonts-dir:
      /usr/sbin/update-fonts-scale:

  mkfontdir:
    hint: Create index of X fonts in directory
    essential:
      base-files_bin:
      dash_bins:
      xfonts-utils_mkfontscale:
    contents:
      /usr/bin/mkfontdir:

  copyright:
    contents:
      /usr/share/doc/xfonts-utils/copyright:
