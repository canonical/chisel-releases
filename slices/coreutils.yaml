      coreutils-from-gnu_mkdir:

  echo:
    essential:
      coreutils-from-gnu_echo:

  ln-bin:
    essential:
      coreutils-from-gnu_ln-bin:

  rm-bin:
    essential:
      coreutils-from-gnu_rm-bin:

  readlink:
    essential:
      coreutils-from-gnu_readlink:

  sort:
    essential:
      coreutils-from-gnu_sort:

  dirname:
    essential:
      coreutils-from-gnu_dirname:

  touch:
    essential:
      coreutils-from-gnu_touch:

  printf:
    essential:
      coreutils-from-gnu_printf:

  basename:
    essential:
      coreutils-from-gnu_basename:

  chmod:
    essential:
      coreutils-from-gnu_chmod:

  chown:
