package: rust-clippy

essential:
  rust-clippy_copyright:

slices:
  clippy:
    essential:
      rust-1.93-clippy_clippy:
      rust-clippy_clippy-driver:
    contents:
      /usr/bin/cargo-clippy:  # symlink to ../lib/rust-1.93/bin/cargo-clippy

  clippy-driver:
    essential:
      rust-1.93-clippy_clippy-driver:
    contents:
      /usr/bin/clippy-driver:  # symlink to ../lib/rust-1.93/bin/clippy-driver

  copyright:
    essential:
      rust-1.93-clippy_copyright:
    contents:
      /usr/share/doc/rust-clippy/copyright:
