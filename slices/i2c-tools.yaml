package: i2c-tools

essential:
  i2c-tools_copyright:

slices:
  bins:
    essential:
      i2c-tools_i2cdetect:
      i2c-tools_i2cdump:
      i2c-tools_i2cget:
      i2c-tools_i2cset:
      i2c-tools_i2ctransfer:

  i2cdetect:
