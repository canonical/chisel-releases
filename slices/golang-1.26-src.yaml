      bash_bins:
      binutils_linker:
      coreutils_bins:
      grep_bins:
    contents:
      /usr/share/go-1.26/src/all.bash:
      /usr/share/go-1.26/src/bootstrap.bash:
      /usr/share/go-1.26/src/buildall.bash:
