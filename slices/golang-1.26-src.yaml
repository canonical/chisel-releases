      /usr/share/go-1.26/src/Make.dist:
      /usr/share/go-1.26/src/a*/**:
      /usr/share/go-1.26/src/b*/**:
      /usr/share/go-1.26/src/cmd/a*/**:
      /usr/share/go-1.26/src/cmd/b*/**:
