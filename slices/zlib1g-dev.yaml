package: zlib1g-dev

essential:
  zlib1g-dev_copyright:

slices:
  libs:
    essential:
      zlib1g_libs:
    contents:
      /usr/lib/*-linux-*/libz.so:  # Symlink to libz.so.1.* from zlib1g
      /usr/lib/*-linux-*/libz.a:

  headers:
    contents:
      /usr/include/zlib.h:
      /usr/include/zconf.h:

  copyright:
    contents:
      /usr/share/doc/zlib1g-dev/copyright:
