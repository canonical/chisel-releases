package: ffmpeg

essential:
  - ffmpeg_copyright

slices:
  bins:
    essential:
      - libavcodec61_libs
      - libavdevice61_libs
      - libavfilter10_libs
      - libavformat61_libs
      - libavutil59_libs
      - libc6_libs
      - libpostproc58_libs
      - libsdl2-2.0-0_libs
      - libswresample5_libs
      - libswscale8_libs
    contents:
      /usr/bin/ffmpeg:
      /usr/bin/ffplay:
      /usr/bin/ffprobe:
      /usr/bin/qt-faststart:

  conf:
    contents:
      /usr/share/ffmpeg/*.ffpreset:
      /usr/share/ffmpeg/ffprobe.xsd:

  copyright:
    contents:
      /usr/share/doc/ffmpeg/copyright:
