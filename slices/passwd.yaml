package: passwd

essential:
  passwd_copyright:

slices:
  # Binaries used to manage system users. These rely on configuratiopn
  # files provided also by the package.
  bins:
    essential:
      libacl1_libs:
      libattr1_libs:
      libaudit1_libs:
      libbsd0_libs:
      libc6_libs:
      libcrypt1_libs:
      libpam-modules_libs:
      libpam0g_libs:
      libselinux1_libs:
      libsemanage2_libs:
      passwd_config:
      passwd_pwck:
      passwd_pwconv:
      passwd_grpck:
      passwd_grpconv:
    contents:
      /usr/bin/chage:
      /usr/bin/chfn:
      /usr/bin/chsh:
      /usr/bin/expiry:
      /usr/bin/gpasswd:
      /usr/bin/passwd:
      /usr/sbin/chgpasswd:
      /usr/sbin/chpasswd:
      /usr/sbin/groupadd:
      /usr/sbin/groupdel:
      /usr/sbin/groupmod:
      /usr/sbin/grpunconv:
      /usr/sbin/newusers:
      /usr/sbin/pwunconv:
      /usr/sbin/useradd:
      /usr/sbin/userdel:
      /usr/sbin/usermod:
      /usr/sbin/vigr:  # Symlink to vipw
      /usr/sbin/vipw:

  pwck:
    essential:
      ...
    contents:
      /usr/sbin/pwck:

  pwconv:
    essential:
      ...
    contents:
      /usr/sbin/pwconv:

  grpck:
    essential:
      ...
    contents:
      /usr/sbin/grpck:

  grpconv:
    essential:
      ...
    contents:
      /usr/sbin/grpconv:

  scripts:
    hint: Turn of shadow passwords
    essential:
      base-files_bin:
      dash_bins:
      coreutils_chmod:
      coreutils_chown:
      coreutils_cmp:
      coreutils_cp-utility:
      coreutils_date:
      coreutils_touch:
      passwd_pwck:
      passwd_pwconv:
      passwd_grpck:
      passwd_grpconv:
      sed_bins:
    contents:
      /usr/sbin/shadowconfig:

  # Essential configurations used by useradd(8) and friends.
  config:
    essential:
      base-passwd_data:
    contents:
      /etc/default/useradd:
      /usr/lib/tmpfiles.d/passwd.conf:

  # This slices contains configuration files used by libpam, and these
  # files also include specific configuration files from the libpam libraries.
  # Since libpam functionality is not directly used/supported, this slice may
  # currently not be very useful.
  pam-config:
    contents:
      /etc/pam.d/chfn:
      /etc/pam.d/chpasswd:
      /etc/pam.d/chsh:
      /etc/pam.d/newusers:
      /etc/pam.d/passwd:

  copyright:
    contents:
      /usr/share/doc/passwd/copyright:
