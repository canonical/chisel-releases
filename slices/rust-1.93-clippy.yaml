package: rust-1.93-clippy

essential:
  rust-1.93-clippy_copyright:

slices:
  clippy:
    essential:
      rust-1.93-clippy_clippy-driver:
    contents:
      /usr/lib/rust-1.93/bin/cargo-clippy:

  clippy-driver:
    essential:
      libc6_libs:
      libgcc-s1_libs:
      libstd-rust-1.93-dev_libs:
    contents:
      /usr/lib/rust-1.93/bin/clippy-driver:

  copyright:
    contents:
      /usr/share/doc/rust-1.93-clippy/copyright:
