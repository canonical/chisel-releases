package: binutils

essential:
  - binutils_copyright

slices:
  archiver:
    # Note: `v3-essential` only works for chisel>=1.3.0
    v3-essential:
      binutils-aarch64-linux-gnu_archiver: {arch: [arm64]}
      binutils-powerpc64le-linux-gnu_archiver: {arch: [ppc64el]}
      binutils-s390x-linux-gnu_archiver: {arch: [s390x]}
      binutils-x86-64-linux-gnu_archiver: {arch: [amd64]}
    contents:
      /usr/bin/ar:  # Symlink to ${ARCH_TRIPLET}-ar

  assembler:
    # Note: `v3-essential` only works for chisel>=1.3.0
    v3-essential:
      binutils-aarch64-linux-gnu_assembler: {arch: [arm64]}
      binutils-powerpc64le-linux-gnu_assembler: {arch: [ppc64el]}
      binutils-s390x-linux-gnu_assembler: {arch: [s390x]}
      binutils-x86-64-linux-gnu_assembler: {arch: [amd64]}
    contents:
      /usr/bin/as:  # Symlink to ${ARCH_TRIPLET}-as

  linker:
    # Note: `v3-essential` only works for chisel>=1.3.0
    v3-essential:
      binutils-aarch64-linux-gnu_linker: {arch: [arm64]}
      binutils-powerpc64le-linux-gnu_linker: {arch: [ppc64el]}
      binutils-s390x-linux-gnu_linker: {arch: [s390x]}
      binutils-x86-64-linux-gnu_linker: {arch: [amd64]}
    contents:
      /usr/bin/ld:  # Symlink to ${ARCH_TRIPLET}-ld
      /usr/bin/ld.bfd:  # Symlink to ${ARCH_TRIPLET}-ld.bfd

  copyright:
    contents:
      /usr/share/doc/binutils/copyright:
